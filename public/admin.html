<!DOCTYPE html>
<html data-bs-theme="dark">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>admin | francisco moura.</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-light">
    <div class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>
    <div class="toast-container"></div>

    <div class="container mt-5">
        <!-- Login Form -->
        <form id="loginForm" class="col-md-6 mx-auto">
            <h2 class="mb-4">Portfolio Admin Login</h2>
            <div class="mb-3">
                <input type="email" class="form-control" id="email" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-outline-light">Login</button>
        </form>

        <!-- Admin Dashboard -->
        <div id="adminDashboard" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Projects Management</h2>
                <div>
                    <button type="button" class="btn btn-outline-light" data-bs-toggle="modal"
                        data-bs-target="#projectModal">
                        Add Project
                    </button>
                    <button onclick="window.location.href='/'" class="btn btn-outline-secondary">Back to Home</button>
                    <button id="signOutBtn" class="btn btn-outline-danger me-2">Sign Out</button>
                </div>
            </div>

            <!-- Projects List -->
            <div class="table-responsive">
                <table class="table table-dark">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Year</th>
                            <th>Visible?</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="projectsList"></tbody>
                </table>
            </div>

            <!-- Project Modal -->
            <div class="modal fade" id="projectModal" tabindex="-1">
                <div class="modal-dialog modal-fullscreen">
                    <div class="modal-content bg-dark">
                        <div class="modal-header border-secondary">
                            <h5 class="modal-title">Project Details</h5>
                            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <form id="projectForm">
                                <input type="hidden" id="projectId">
                                <div class="row">
                                    <div class="col-md-10">
                                        <div class="row mb-3">
                                            <div class="col-md-8">
                                                <label class="form-label">Project Name</label>
                                                <input type="text" class="form-control" id="projectName" required>
                                            </div>
                                            <div class="col-md-1">
                                                <label class="form-label">Year</label>
                                                <input type="number" class="form-control" id="projectYear" required>
                                            </div>
                                            <div class="col-md-2">
                                                <label class="form-label">Owner</label>
                                                <input type="text" class="form-control" id="projectOwner">
                                            </div>
                                            <div class="col-md-1">
                                                <label class="form-label">Visible?</label>
                                                <select class="form-control" id="projectVisible" required>
                                                    <option value="true">Yes</option>
                                                    <option value="false">No</option>
                                                </select>
                                            </div>
                                        </div>
                                        <div class="row mb-3">
                                            <div class="col-12">
                                                <label class="form-label">Description</label>
                                                <textarea class="form-control" id="projectDescription" rows="5"
                                                    required></textarea>
                                            </div>
                                        </div>
                                        <div class="row mb-3">
                                            <div class="col-md-4">
                                                <label class="form-label">Type</label>
                                                <input type="text" class="form-control" id="projectType" required>
                                            </div>
                                            <div class="col-md-4">
                                                <label class="form-label">Tools</label>
                                                <div class="tools-input-container">
                                                    <input type="text" class="form-control" id="toolInput"
                                                        placeholder="Select a tool" list="toolsList">
                                                    <datalist id="toolsList"></datalist>
                                                    <div id="toolTags" class="tool-tags mb-2"></div>
                                                </div>
                                            </div>
                                            <div class="col-md-4">
                                                <label class="form-label">Tags</label>
                                                <div class="tools-input-container">
                                                    <input type="text" class="form-control" id="tagInput"
                                                        placeholder="Choose a tag" list="tagsList">
                                                    <datalist id="tagsList"></datalist>
                                                    <div id="projectTags" class="tool-tags mb-2"></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    <div class="col-md-2">
                                        <div class="mb-3">
                                            <label class="form-label">Thumbnail</label>
                                            <input type="file" class="form-control" id="projectThumbnail"
                                                accept="image/*">
                                        </div>
                                    </div>
                                </div>

                                <hr class="border-secondary">
                                <h5 class="mt-4 mb-3">Sections</h5>
                                <div id="projectSections" class="mb-3"></div>
                                <button type="button" class="btn btn-outline-light" id="addSectionBtn">Add
                                    Section</button>


                                <hr class="border-secondary" style="margin-top: 2rem;">
                                <div class="row w-100 mb-2">
                                    <div class="col-12 text-end">
                                        <button type="submit" class="btn btn-primary">Save Project</button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/admin.js"></script>
</body>

</html>
