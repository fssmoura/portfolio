<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>admin | francisco moura.</title>
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container mt-5">
        <!-- Login Form -->
        <form id="loginForm" class="col-md-6 mx-auto">
            <h2 class="mb-4">Portfolio Admin Login</h2>
            <div class="mb-3">
                <input type="email" class="form-control" id="email" placeholder="Email" required>
            </div>
            <div class="mb-3">
                <input type="password" class="form-control" id="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <!-- Admin Dashboard -->
        <div id="adminDashboard" class="d-none">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Projects Management</h2>
                <div>
                    <button type="button" class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#projectModal">
                        Add Project
                    </button>
                    <button onclick="window.location.href='/'" class="btn btn-outline-primary">Back to Home</button>
                    <button id="signOutBtn" class="btn btn-secondary me-2">Sign Out</button>
                </div>
            </div>

            <!-- Projects List -->
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Year</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="projectsList"></tbody>
                </table>
            </div>

            <!-- Project Modal -->
            <div class="modal fade" id="projectModal" tabindex="-1">
                <div class="modal-dialog modal-fullscreen">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h5 class="modal-title">Project Details</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <form id="projectForm">
                                <input type="hidden" id="projectId">
                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Project Name</label>
                                        <input type="text" class="form-control" id="projectName" required>
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Type</label>
                                        <input type="text" class="form-control" id="projectType" required>
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Year</label>
                                        <input type="number" class="form-control" id="projectYear" required>
                                    </div>
                                    <div class="col-md-2">
                                        <label class="form-label">Owner</label>
                                        <input type="text" class="form-control" id="projectOwner">
                                    </div>
                                </div>

                                <div class="row mb-3">
                                    <div class="col-md-6">
                                        <label class="form-label">Tools</label>
                                        <div class="tools-input-container">
                                            <div id="toolTags" class="tool-tags mb-2"></div>
                                            <input type="text" class="form-control" id="toolInput" list="toolsList"
                                                placeholder="Type or select tools...">
                                            <datalist id="toolsList"></datalist>
                                        </div>
                                    </div>
                                    <div class="col-md-6">
                                        <label class="form-label">Tags</label>
                                        <div class="tools-input-container">
                                            <div id="projectTags" class="tool-tags mb-2"></div>
                                            <input type="text" class="form-control" id="tagInput" list="tagsList"
                                                placeholder="Type or select tags...">
                                            <datalist id="tagsList"></datalist>
                                        </div>
                                    </div>
                                </div>

                                <h5 class="mt-4 mb-3">Assets</h5>
                                <hr>

                                <div class="row mb-3">
                                    <div class="col-md-2">
                                        <label class="form-label">Thumbnail</label>
                                        <input type="file" class="form-control" id="projectThumbnail" accept="image/*">
                                    </div>
                                </div>
                                <button type="submit" class="btn btn-primary">Save Project</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="/js/admin.js"></script>
</body>

</html>
